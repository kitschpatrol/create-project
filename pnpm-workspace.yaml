packages:
  - '.'
  - templates/*
  - templates/unplugin/playground
ignoreWorkspaceRootCheck: true
publicHoistPattern:
  - '@kitschpatrol/repo-config'
  - '@kitschpatrol/typescript-config'
  - 'case-police'
  - '*cspell*'
  - '*eslint*'
  - '*knip*'
  - '*mdat*'
  - '*prettier*'
  - '*remark*'
  - '*stylelint*'
allowBuilds:
  core-js: true
  electron: true
  electron-winstaller: true
  esbuild: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@kitschpatrol/*'
  - 'lognow'
  - 'mdat'
  - 'mdat-plugin-cli-help'
  - 'poptab'
  - 'remark-mdat'

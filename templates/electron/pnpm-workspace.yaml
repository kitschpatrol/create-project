overrides:
  'vite': 'npm:rolldown-vite@7.3.0'

publicHoistPattern:
  - '@kitschpatrol/repo-config'
  - '@kitschpatrol/typescript-config'
  - 'case-police'
  - '*cspell*'
  - '*eslint*'
  - '*knip*'
  - '*mdat*'
  - '*prettier*'
  - '*remark*'
  - '*stylelint*'
allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  puppeteer: true
  unrs-resolver: true

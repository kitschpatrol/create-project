publicHoistPattern:
  - '@kitschpatrol/repo-config'
  - '@kitschpatrol/typescript-config'
  - 'case-police'
  - '*cspell*'
  - '*eslint*'
  - '*knip*'
  - '*mdat*'
  - '*prettier*'
  - '*remark*'
  - '*stylelint*'
allowBuilds:
  esbuild: true
  puppeteer: true
  unrs-resolver: true
overrides:
  # See https://github.com/arethetypeswrong/arethetypeswrong.github.io/issues/258 https://github.com/101arrowz/fflate/issues/258
  fflate: 0.8.2
